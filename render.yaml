services:
  - type: web
    name: cryptobot-prime
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    disk:
      name: cryptobot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: HOST
        value: 0.0.0.0
      - key: SERVE_STATIC
        value: "true"
      - key: AUTH_DATA_DIR
        value: /data
      - key: BLOB_SYNC_DISABLED
        value: "true"
      - key: AUTH_HASH_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
